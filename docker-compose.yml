version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gk_poc_graphql
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: gk_poc_graphql
      JWT_SECRET: dev_jwt_secret_change_in_production
      JWT_EXPIRES_IN: 30d
      GRAPHQL_PLAYGROUND: 'true'
      GRAPHQL_INTROSPECTION: 'true'
      LOG_LEVEL: debug
    depends_on:
      - postgres

volumes:
  postgres_data:
